<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Map Editor</title>
    <style>
        #toolbar {
            position: absolute;
            left: 20px;
            top: 100px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-family: sans-serif;
            user-select: none;
        }

        .tool-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            text-align: left;
        }

        .tool-btn:hover {
            background: #444;
        }

        .tool-btn.active {
            background: #0088ff;
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
        }

        .tool-btn.eraser {
            background: #622;
        }

        .tool-btn.eraser.active {
            background: #a22;
            border-color: #f44;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            gap: 20px;
            align-items: center;
            color: white;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        #top-bar h2 {
            margin: 0;
            font-size: 20px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        #top-bar input {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        #save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        #save-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        #save-btn:active {
            transform: translateY(1px);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            color: #ccc;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 6px;
            pointer-events: none;
            border: 1px solid #333;
            font-size: 14px;
        }
    </style>
  <script type="module" crossorigin src="/assets/editor-ob9PuDfV.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/three.module-D0DXM2gH.js">
  <link rel="stylesheet" crossorigin href="/assets/three-DY3e6C8M.css">
</head>

<body>
    <div id="top-bar">
        <h2>Map Builder</h2>
        <div style="margin-left: 20px; padding-left: 20px; border-left: 1px solid #555;">
            <label style="margin-right: 8px; color: #bbb;">Load Map:</label>
            <select id="map-select"
                style="background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px;">
                <option value="">-- New Map --</option>
            </select>
            <button id="load-btn"
                style="background: #0088ff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Load</button>
        </div>
        <div style="margin-left: auto;">
            <label style="margin-right: 8px; color: #bbb;">Name:</label>
            <input type="text" id="map-name" value="New Room" />
        </div>
        <button id="save-btn">Save to DB</button>
        <div id="status-msg" style="color: #ff0; font-weight: bold; min-width: 150px;"></div>
    </div>
    <div id="toolbar">
        <button class="tool-btn active" data-tool="wall">🧱 Wall</button>
        <button class="tool-btn" data-tool="npc">🤖 NPC</button>
        <button class="tool-btn" data-tool="exit">🚪 Exit</button>
        <button class="tool-btn" data-tool="spawn">📍 Set Spawn</button>
        <button class="tool-btn eraser" data-tool="erase">❌ Eraser</button>
    </div>
    <div id="instructions">
        <strong>Left Click + Drag</strong>: Use Tool &nbsp;&nbsp;|&nbsp;&nbsp; <strong>Right Click + Drag</strong>:
        Orbit Camera
    </div>
</body>

</html>
