<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Map Editor</title>
    <style>
        #toolbar {
            position: absolute;
            left: 20px;
            top: 180px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-family: sans-serif;
            user-select: none;
        }

        .tool-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            text-align: left;
        }

        .tool-btn:hover {
            background: #444;
        }

        .tool-btn.active {
            background: #0088ff;
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
        }

        .tool-btn.eraser {
            background: #622;
        }

        .tool-btn.eraser.active {
            background: #a22;
            border-color: #f44;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            color: white;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        #top-bar h2 {
            margin: 0;
            font-size: 20px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        #top-bar input {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        #save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        #save-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        #save-btn:active {
            transform: translateY(1px);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            color: #ccc;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 6px;
            pointer-events: none;
            border: 1px solid #333;
            font-size: 14px;
        }

        /* Responsive Layout Adjustments */
        @media (max-width: 1200px) {
            #toolbar {
                top: 220px;
            }
        }

        @media (max-width: 850px) {
            #toolbar {
                top: 280px;
            }
        }
    </style>

  <link rel="modulepreload" crossorigin href="/assets/three-DSYXhUD5-FD61jN0V-pLutLe-c-pLutLe-c.js">
  <link rel="modulepreload" crossorigin href="/assets/three-DSYXhUD5-FD61jN0V-GdVMZDgy-DHIlc6qT.js">
  <script type="module" crossorigin src="/assets/editor-CJj2JptK.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/main-DSYXhUD5-BqhMSj6r.js">
  <link rel="stylesheet" crossorigin href="/assets/main-DSYXhUD5-DSYXhUD5.css">
</head>

<body>
    <div id="top-bar">
        <h2 style="flex-shrink: 0; margin-right: 10px;">Map Builder</h2>
        <div
            style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding-left: 15px; border-left: 1px solid #555;">
            <label style="color: #bbb;">Load Map:</label>
            <select id="map-select"
                style="background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px;">
                <option value="">-- New Map --</option>
            </select>
            <button type="button" id="load-btn"
                style="background: #0088ff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Load</button>
            <button type="button" id="delete-btn"
                style="background: #cc2222; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; display: none;">Delete</button>
        </div>
        <div style="margin-left: auto; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <div
                style="background: #2a2a3a; padding: 5px; border-radius: 6px; border: 1px solid #445; display: flex; align-items: center;">
                <label style="color: #bbb; margin: 0 10px; font-weight: bold; font-size: 14px;">View:</label>
                <select id="view-toggle"
                    style="background: #111; color: #0f0; border: 1px solid #0f0; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; outline: none;">
                    <option value="area">Area (3D)</option>
                    <option value="world">World (Graph)</option>
                </select>
            </div>

            <button type="button" id="open-world-map-btn"
                style="background: #2a2a3a; color: white; border: 1px solid #445; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; flex-shrink: 0;">🌍
                Teleport Hub</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <label style="color: #bbb;">Name:</label>
            <input type="text" id="map-name" value="New Room" style="width: 150px;" />
            <button type="button" id="save-btn">Save to DB</button>
            <div id="status-msg" style="color: #ff0; font-weight: bold; min-width: 120px;"></div>
        </div>
    </div>
    <div id="toolbar">
        <div style="display: flex; gap: 5px;">
            <button class="tool-btn active" data-tool="wall" style="flex-grow: 1;">🧱 Wall</button>
            <select id="texture-select"
                style="background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 0 5px;">
                <option value="ground.png">Default</option>
                <option value="stone.png">Stone</option>
                <option value="tech.png">Tech</option>
            </select>
        </div>
        <button class="tool-btn" data-tool="ceiling">☁️ Ceiling</button>
        <button class="tool-btn" data-tool="npc">🤖 NPC</button>
        <button class="tool-btn" data-tool="exit">🚪 Exit</button>
        <button class="tool-btn" data-tool="link" style="background: #0055aa;">🔗 Link Rooms</button>
        <button class="tool-btn" data-tool="spawn">📍 Set Spawn</button>
        <button class="tool-btn eraser" data-tool="erase">❌ Eraser</button>
    </div>
    <div id="instructions">
        <strong>Left Click + Drag</strong>: Use Tool (Draw Walls / Connect Rooms in Graph) &nbsp;&nbsp;|&nbsp;&nbsp;
        <strong>Right Click + Drag</strong>:
        Orbit Area Camera
    </div>

    <!-- World Map Panel Overlay -->
    <div id="world-map-panel"
        style="display: none; position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; background: rgba(20, 20, 25, 0.95); border: 2px solid #556; border-radius: 12px; padding: 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: sans-serif;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: white; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Teleport Hub</h2>
            <button type="button" id="close-world-map-btn"
                style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Close</button>
        </div>
        <div id="world-map-list"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto;">
            <!-- Buttons injected by JS -->
        </div>
    </div>

    <!-- Custom Confirm Delete Modal -->
    <div id="delete-confirm-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; font-family: sans-serif;">
        <div
            style="background: #2a2a3a; padding: 25px; border-radius: 8px; border: 1px solid #445; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <h3 style="color: #ff4444; margin-top: 0;">⚠️ Delete Map</h3>
            <p style="color: #ddd; margin-bottom: 25px;">Are you sure you want to permanently delete this map? This
                cannot be undone.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button type="button" id="cancel-delete-btn"
                    style="background: #555; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Cancel</button>
                <button type="button" id="confirm-delete-btn"
                    style="background: #cc2222; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Yes,
                    Delete It</button>
            </div>
        </div>
    </div>

    <!-- Custom Text Prompt Modal -->
    <div id="text-prompt-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; font-family: sans-serif;">
        <div
            style="background: #2a2a3a; padding: 25px; border-radius: 8px; border: 1px solid #445; text-align: left; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <h3 id="text-prompt-title" style="color: #0088ff; margin-top: 0; margin-bottom: 15px;">Input Required</h3>
            <input type="text" id="text-prompt-input"
                style="width: 100%; padding: 10px; box-sizing: border-box; background: #111; color: white; border: 1px solid #555; border-radius: 4px; margin-bottom: 25px;" />
            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <button type="button" id="cancel-prompt-btn"
                    style="background: #555; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Cancel</button>
                <button type="button" id="submit-prompt-btn"
                    style="background: #0088ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Submit</button>
            </div>
        </div>
    </div>

    <!-- Custom Map Select Modal -->
    <div id="map-select-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; font-family: sans-serif;">
        <div
            style="background: #2a2a3a; padding: 25px; border-radius: 8px; border: 1px solid #445; text-align: left; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <h3 style="color: #0088ff; margin-top: 0; margin-bottom: 5px;">Select Target Map</h3>
            <p style="color: #aaa; margin-top: 0; margin-bottom: 15px; font-size: 14px;">Where should this door lead
                to?</p>
            <select id="map-select-prompt"
                style="width: 100%; padding: 10px; box-sizing: border-box; background: #111; color: white; border: 1px solid #555; border-radius: 4px; margin-bottom: 25px; cursor: pointer;">
                <!-- Populated by JS -->
            </select>
            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <button type="button" id="cancel-map-select-btn"
                    style="background: #555; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Cancel</button>
                <button type="button" id="submit-map-select-btn"
                    style="background: #0088ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Submit</button>
            </div>
        </div>
    </div>

    <!-- 2D World Graph Canvas -->
    <canvas id="graph-canvas"
        style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; background: #1a1a24; cursor: grab;"></canvas>

</body>

</html>
